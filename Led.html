<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LED Puzzle</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<style>
:root {
  --active: #007bff;
  --success: #28a745;
  --danger: #dc3545;
  --bg: #f0f2f5;
  --card-bg: #ffffff;
  --led-red: #ff4d4d;
  --led-green: #2ecc71;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Pretendard', sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 20px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container-fixed {
  width: 100%;
  max-width: 600px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 30px 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  text-align: center;
}

h1 { margin: 0 0 10px; font-size: 28px; font-weight: 800; color: #333; }
.description { color: #666; margin-bottom: 30px; font-size: 14px; line-height: 1.5; }

/* LED 영역: 숫자 라벨 제거 및 간격 조정 */
.led-container {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 15px;
  margin-bottom: 30px;
  padding: 10px;
}

.led {
  width: clamp(35px, 8vw, 55px);
  height: clamp(35px, 8vw, 55px);
  border-radius: 50%;
  border: 4px solid rgba(0,0,0,0.1);
  margin: 0 auto;
  transition: background-color 0.3s, box-shadow 0.3s, transform 0.1s;
}

.led.red { 
  background-color: var(--led-red); 
  box-shadow: 0 0 15px rgba(255, 77, 77, 0.5); 
}
.led.green { 
  background-color: var(--led-green); 
  box-shadow: 0 0 15px rgba(46, 204, 113, 0.5); 
}

/* 버튼 스타일 */
.button-container {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
}

.control-btn {
  padding: 15px 0;
  border-radius: 12px;
  border: none;
  background: #e9ecef;
  color: #444;
  font-weight: 800;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.1s;
  box-shadow: 0 4px 0 #ced4da;
}

.control-btn:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #ced4da;
}

/* 상태 정보 영역 (시간 및 횟수) */
.status-bar {
  display: flex;
  justify-content: space-around;
  margin-top: 30px;
  padding: 15px;
  background: #f8f9fa;
  border-radius: 15px;
}

.status-item { font-size: 14px; color: #666; }
.status-value { display: block; font-size: 20px; font-weight: 800; color: var(--active); margin-top: 5px; }

/* 모달 */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; justify-content: center; align-items: center; z-index: 1000;
  backdrop-filter: blur(5px);
}
.modal {
  background: #fff; padding: 40px; border-radius: 25px; text-align: center; width: 90%; max-width: 350px;
}
</style>
</head>
<body>

<div class="container-fixed">
  <h1>LED Puzzle</h1>
  <p class="description">모든 LED를 초록색으로 만드세요!<br>연결된 LED들의 색상을 반전시켜 퍼즐을 풉니다.</p>

  <div class="led-container">
    <div id="led-1" class="led"></div>
    <div id="led-2" class="led"></div>
    <div id="led-3" class="led"></div>
    <div id="led-4" class="led"></div>
    <div id="led-5" class="led"></div>
    <div id="led-6" class="led"></div>
  </div>

  <div class="button-container">
    <button class="control-btn" onclick="pressButton(1)">1</button>
    <button class="control-btn" onclick="pressButton(2)">2</button>
    <button class="control-btn" onclick="pressButton(3)">3</button>
    <button class="control-btn" onclick="pressButton(4)">4</button>
    <button class="control-btn" onclick="pressButton(5)">5</button>
    <button class="control-btn" onclick="pressButton(6)">6</button>
  </div>

  <div class="status-bar">
    <div class="status-item">진행 시간<span id="timer-val" class="status-value">00:00</span></div>
    <div class="status-item">클릭 횟수<span id="click-val" class="status-value">0</span></div>
  </div>
</div>

<div class="overlay" id="success-overlay">
  <div class="modal">
    <h2 style="color:var(--success); font-size: 32px; margin: 0;">SUCCESS!</h2>
    <div style="margin: 25px 0; text-align: left; background: #f0f2f5; padding: 15px; border-radius: 12px;">
      <p style="margin: 5px 0;">⏱ 소요 시간: <span id="final-time" style="font-weight:bold"></span></p>
      <p style="margin: 5px 0;">🖱 클릭 횟수: <span id="final-clicks" style="font-weight:bold"></span>회</p>
    </div>
    <button class="control-btn" style="width:100%; background: var(--active); color:#fff; box-shadow: 0 4px 0 #0056b3;" onclick="resetGame()">다시 도전</button>
  </div>
</div>

<script>
let ledStates = { 1: false, 2: true, 3: true, 4: false, 5: false, 6: true };
const buttonMapping = {
  1: [1, 2, 4], 2: [1, 5, 6], 3: [2, 3, 4],
  4: [3, 4, 5], 5: [2, 3, 6], 6: [1, 2, 3]
};

let clicks = 0;
let startTime = null;
let timerInterval = null;
let isRunning = false;

function startTimer() {
  if (!isRunning) {
    startTime = new Date();
    isRunning = true;
    timerInterval = setInterval(updateTimer, 1000);
  }
}

function updateTimer() {
  const now = new Date();
  const diff = Math.floor((now - startTime) / 1000);
  const min = String(Math.floor(diff / 60)).padStart(2, '0');
  const sec = String(diff % 60).padStart(2, '0');
  $("#timer-val").text(`${min}:${sec}`);
}

function updateDisplay() {
  for (let i = 1; i <= 6; i++) {
    const led = $(`#led-${i}`);
    if (ledStates[i]) {
      led.removeClass('red').addClass('green');
    } else {
      led.removeClass('green').addClass('red');
    }
  }
  $("#click-val").text(clicks);
}

function pressButton(btnNum) {
  if (cleared) return;
  
  // 첫 버튼 클릭 시 타이머 시작
  if (clicks === 0) startTimer();
  
  clicks++;
  buttonMapping[btnNum].forEach(num => {
    ledStates[num] = !ledStates[num];
  });

  updateDisplay();
  checkWin();
}

let cleared = false;
function checkWin() {
  const allGreen = Object.values(ledStates).every(s => s === true);
  if (allGreen) {
    cleared = true;
    clearInterval(timerInterval);
    isRunning = false;
    
    setTimeout(() => {
      $("#final-time").text($("#timer-val").text());
      $("#final-clicks").text(clicks);
      $("#success-overlay").css("display", "flex");
    }, 400);
  }
}

function resetGame() {
  ledStates = { 1: false, 2: true, 3: true, 4: false, 5: false, 6: true };
  clicks = 0;
  cleared = false;
  isRunning = false;
  clearInterval(timerInterval);
  $("#timer-val").text("00:00");
  $("#success-overlay").hide();
  updateDisplay();
}

$(document).ready(() => {
  updateDisplay();
});
</script>

</body>
</html>

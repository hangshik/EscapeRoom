<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>제 3 공업단지</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<style>
:root {
  --active: #007bff;
  --success: #28a745;
  --danger: #dc3545;
  --hint: #17a2b8;
  --bg: #f0f2f5;
  --card-bg: #ffffff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 15px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

.container-fixed {
  width: 100%;
  max-width: 800px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

h1 { 
  margin: 0 0 20px; 
  font-size: clamp(20px, 5vw, 32px);
  text-align: center; 
  font-weight: 800; 
}

/* 단계 버튼 그리드 */
.stage-button-container {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  width: 100%;
}

.stage-button {
  width: 100%;
  padding: 12px 2px;
  border-radius: 10px;
  border: 1px solid #e9ecef;
  background: #f8f9fa;
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

.stage-button.active { background: var(--active); color: #fff; border-color: var(--active); }
.stage-button.stage-success { background: var(--success); color: #fff; border-color: var(--success); }

.status-bar { 
  display: flex; 
  justify-content: flex-end; 
  margin-top: 15px; 
  gap: 8px; 
}

.badge { 
  padding: 6px 12px; 
  border-radius: 20px; 
  font-size: 14px; 
  font-weight: 700; 
  border: 1px solid; 
}
.wrong-badge { background: #fff5f5; color: var(--danger); border-color: #ffe3e3; }

/* 수정된 quiz-rule 및 신규 rule-item */
.quiz-rule {
  background: #f8f9fa;
  padding: 15px 15px; 
  border-radius: 12px;
  margin-bottom: 20px;
  font-size: 20px;
  border-left: 4px solid var(--active);
  line-height: 1.5;
}

.rule-item {
  display: block;
  padding-left: 22px;   /* 기준선 */
  text-indent: -22px;  /* 점을 왼쪽으로 당김 */
  margin-bottom: 8px;  
  text-align: left;
  word-break: keep-all;
}

/* 6단계 중앙 정렬 박스 보정 */
.text-center-box {
  display: block;
  text-align: center;
  width: 100%;
  margin-top: 15px;
  font-weight: 800;
  color: #444;
  text-indent: 0; /* 들여쓰기 해제 */
}

.grid-container {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  background: #e9ecef;
  padding: 10px;
  border-radius: 15px;
  margin: 0 auto;
  max-width: 400px;
}

.grid-cell {
  aspect-ratio: 1 / 1;
  background-color: #fff;
  border: 2px solid #dee2e6;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: clamp(14px, 4vw, 20px);
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  transition: 0.2s;
}

.grid-cell.selected {
  background-color: #ff6b6b;
  color: white;
  border-color: #fa5252;
  transform: scale(0.95);
}

.grid-cell.empty { background-color: #f1f3f5; }

/* 컨트롤 버튼 */
.input-group { 
  margin-top: 25px; 
  display: flex; 
  justify-content: center; 
  gap: 8px; 
  flex-wrap: wrap;
}

/* CSS 수정 */
.btn-ctrl {
  padding: 12px 10px; /* 좌우 패딩을 줄이고 대신 min-width로 크기 조절 */
  border-radius: 12px; 
  font-size: 16px; 
  font-weight: 700; 
  cursor: pointer;
  border: 1px solid #dee2e6;
  background: #fff;
  /* 추가된 속성: 가로 길이를 키우고 동일하게 맞춤 */
  flex: 1; 
  min-width: 110px; 
  transition: 0.2s;
}

.btn-ctrl:active {
  background: #f1f3f5;
}

.btn-submit {
  background: var(--active);
  color: #fff; 
  border: none;
  /* 정답 확인 버튼은 더 강조하기 위해 2배의 공간 할당 */
  flex: 2; 
  min-width: 150px;
}

.clearBtn {
  border: 2px solid var(--danger) !important;
  color: var(--danger) !important;
  background-color: #ffffff !important;
  font-weight: 800 !important;
}
.clearBtn:hover{
  background-color: #fff5f5 !important;
}
.clearBtn:active{
  background-color: #ffe3e3 !important;
}


/* 모달 디자인 */
.success-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 10000;
  padding: 20px;
}
.success-modal { 
  background: #fff; 
  padding: 30px; 
  border-radius: 20px; 
  text-align: center; 
  width: 100%; 
  max-width: 350px; 
}

@media (min-width: 800px) {
  .container-fixed { padding: 35px; }
  .grid-container { gap: 12px; padding: 20px; }
}
</style>
</head>
<body>

<div class="container-fixed">
  <h1>제 3 공업단지</h1>
  <div id="stage-buttons" class="stage-button-container">
    <button id="btn1" class="stage-button" onclick="setStage(1)">1단계</button>
    <button id="btn2" class="stage-button" onclick="setStage(2)">2단계</button>
    <button id="btn3" class="stage-button" onclick="setStage(3)">3단계</button>
    <button id="btn4" class="stage-button" onclick="setStage(4)">4단계</button>
    <button id="btn5" class="stage-button" onclick="setStage(5)">5단계</button>
    <button id="btn6" class="stage-button" onclick="setStage(6)">6단계</button>
  </div>
  <div class="status-bar">
    <div class="badge wrong-badge">오답 횟수: <span id="wrong-count">0</span></div>
  </div>
</div>

<div class="container-fixed">
  <div id="stage-rule" class="quiz-rule"></div>
  <div class="grid-container" id="grid"></div>
  
<div class="input-group" style="display: flex; width: 100%; gap: 8px;">
  <button class="btn-ctrl" onclick="undoMove()">↶ 되돌리기</button>
  <button class="btn-ctrl clearBtn" onclick="resetPuzzle()">🔄 초기화</button>
  <button class="btn-ctrl btn-submit" onclick="checkAnswer()">✓ 정답 확인</button>
</div>

<script>
const gridStageData = {
  1: {
    gridContent: [null, null, null, null, null, null, "1", null, "1", "2", null, null, null, null, null, "3", "2", null, "4", "3", null, null, null, null, "4"],
    correctSequence: [6,7,8,16,11,10,5,0,1,2,3,4,9,15,20,21,22,17,12,13,14,19,18,23,24],
    // 예시: <br>과 ㆍ 사이에 띄어쓰기가 절대 없어야 합니다.
rule: `
      <div class='rule-item'>ㆍ같은 숫자 2개를 연결하는 가상의 선이 그려져 있다.</div>
      <div class='rule-item'>ㆍ선은 서로 만나지 않아야 하며 모든 빈칸을 채워야 한다.</div>
      <div class='rule-item'>ㆍ왼쪽 숫자가 시작점, 오른쪽 숫자가 끝점이다.</div>
      <div class='rule-item'>ㆍ첫 번째 가상의 선부터 네 번째 가상의 선까지 차례대로 그려나가는 방식으로 버튼을 누른다.</div>
    `
  },
  2: {
    gridContent: [1, 5, 4, 3, 2, 3, null, null, null, 4, 5, null, null, null, 1, 2, null, null, null, 3, 4, 3, 2, 1, 5],
    correctSequence: [3,4,19,22,21,15,5,6,13,12],
    rule: `
    <div class='rule-item'>ㆍ빈칸에 다음과 같은 규칙으로 숫자가 숨겨져있다.</div>
    <div class='rule-item'> &nbsp &nbsp - 가로, 세로, 대각선에 1부터 5까지 숫자가 하나씩 있다.</div>
    <div class='rule-item'>ㆍ빈칸에 숫자를 모두 찾았다면 맨 윗줄 첫 번째칸에서부터, 시계방향으로 나선을 그리며 누르되 '2', '3'이 쓰인 버튼만 누른다.</div>
      `
  },
  3: {
    gridContent: Array(25).fill(null),
    correctSequence: [20, 15, 10, 5, 0, 6, 12, 18, 24, 19, 14, 9, 4],
    rule: `
    <div class='rule-item'>ㆍ다음 단어들의 공통점을 찾아 그 모양에 맞게 버튼을 눌러야 한다.</div>
    <div class='rule-item'>ㆍ버튼을 누르는 순서는 왼쪽 맨 아래 칸부터 한붓 그리기로 그려나간다.</div>
    <div class='rule-item'>ㆍ단어: 11월, 북쪽, 공책, 이름, 다음, 이웃, 자연, 숫자, 밤, 9</div>
      `
  },
  4: {
    gridContent: [8, 9, 10, 12, 14, 25, 27, 15, 3, 16, 28, 21, 2, 22, 29, 30, 32, 5, 33, 6, 4, 34, 35, 7, 41],
    correctSequence: [16, 9, 0, 20, 21, 13, 2, 12, 24, 14, 5, 17],
    rule: `
    <div class='rule-item'>ㆍ모든 숫자 중 3의 배수와 7의 배수를 제외한 숫자 중 높은 수부터 다음 순서에 따라 누른다.</div>
    <div class='rule-item'>ㆍ순서: 4의 배수 → 2의 배수 → 나머지 수</div>
      `
  },
  5: {
    gridContent: ["ㄴ", "ㅣ", "ㅕ", "ㅇ", "ㅔ", "ㅏ", "ㄱ", "ㄴ", "ㄱ", "ㅇ", "ㄹ", "ㄹ", "ㄸ", "ㅜ", "ㅇ", "ㅑ", "ㅜ", "ㅐ", "ㄸ", "ㅏ", "?", "ㄱ", "ㄴ", "ㅣ", "ㄴ"],
    correctSequence: [14,19,24,23,18,17,22,21,16,11,12,13,8,9,4,3,2,7,6,1,0,5,10,15,20],
    rule: `
    <div class='rule-item'>ㆍ버튼의 자음과 모음을 이어 하나의 문장을 만든다.</div>
    <div class='rule-item'>ㆍ첫 글자부터 한붓그리기로 순서대로 누른다.</div>
      `
  },
  6: {
    gridContent: ["리", "베", "수", "보", "대", "디", "각", "포", "네", "초", "맘", "구", "타", "솔", "카", "누", "소", "키", "립", "람", "라", "테", "잔", "무", "루"],
    correctSequence: [6, 20, 18, 2, 14],
    // 6단계 rule 부분만 교체
    rule: `
    <div class='rule-item'>ㆍ다음 글자를 조합하면 다섯 글자로 이루어진 단어 5개를 만들 수 있지만, 각 단어에는 한 개의 글자가 누락되어 있다.</div>
    <div class='rule-item'>ㆍ누락되어 있는 글자를 버튼에서 찾아 모두 눌러야 한다.</div>
    <div class='rule-item'>ㆍ버튼을 누르는 순서는 '가나다' 순이다.</div>
    <span class='text-center-box'>리 독 아 형 인 관 분 노 삼 직<br>스 피 각 기 고 타 념 메 해 소</span>
    `
  }
};

let currentStage = 1;
let clearedStages = new Set();
let userClickSequence = [];
let totalWrongCount = 0;

function setStage(stage) {
  currentStage = stage;
  userClickSequence = [];
  renderStageButtons();
  initializeGrid();
  $("#wrong-count").text(totalWrongCount);
}

function renderStageButtons() {
  $(".stage-button").each(function() {
    const s = parseInt(this.id.replace('btn', ''));
    $(this).removeClass("active stage-success");
    if (s === currentStage) $(this).addClass("active");
    if (clearedStages.has(s)) $(this).addClass("stage-success");
  });
}

function initializeGrid() {
  const grid = $("#grid").empty();
  const data = gridStageData[currentStage];
  $("#stage-rule").html(data.rule);

  data.gridContent.forEach((content, index) => {
    const cell = $("<div></div>")
      .addClass("grid-cell")
      .attr("data-index", index)
      .text(content || "")
      .on("click", handleCellClick);
    
    if (content === null || content === "") cell.addClass("empty");
    grid.append(cell);
  });
}

function handleCellClick() {
  const index = parseInt($(this).attr("data-index"));
  if ($(this).hasClass("selected")) return;
  
  $(this).addClass("selected");
  userClickSequence.push(index);
}

function undoMove() {
  if (userClickSequence.length === 0) return;
  const lastIndex = userClickSequence.pop();
  $(`.grid-cell[data-index='${lastIndex}']`).removeClass("selected");
}

function resetPuzzle() {
  userClickSequence = [];
  $(".grid-cell").removeClass("selected");
}

function checkAnswer() {
  // 1. 버튼 클릭 시 포커스를 즉시 제거하여 Enter 키 오작동 방지
  if (document.activeElement instanceof HTMLElement) {
    document.activeElement.blur();
  }

  const correct = gridStageData[currentStage].correctSequence;
  const isCorrect = userClickSequence.length === correct.length && 
                    userClickSequence.every((val, i) => val === correct[i]);

  if (isCorrect) {
    clearedStages.add(currentStage);
    renderStageButtons();
    showSuccess();
  } else {
    totalWrongCount++;
    $("#wrong-count").text(totalWrongCount);
    showFailure();
  }
}

// 2. 문서 전체에서 Enter 키가 기본 동작(버튼 재클릭 등)을 하지 못하도록 차단
$(document).on("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault(); // Enter 키의 기본 동작 방지
    return false;
  }
});

function showSuccess() {
  const modal = $(`
    <div class="success-overlay">
      <div class="success-modal" style="border-top: 5px solid var(--success);">
        <h2 style="color:var(--success); margin-top:0;">🎉 정답!</h2>
        <p style="font-size:18px;">참 잘하셨습니다!</p>
        <button id="modalNextBtn" class="btn-ctrl btn-submit" style="width:100%; margin-top:20px;background:var(--success);">다음 단계로</button>
      </div>
    </div>
  `);
  $("body").append(modal);

  // Enter 키 관련 이벤트 리스너를 모두 제거하고 클릭 이벤트만 남겼습니다.
  const closeAndNext = () => {
    modal.remove();
    let next = currentStage + 1;
    if (next <= Object.keys(gridStageData).length) setStage(next);
  };

  $("#modalNextBtn").click(closeAndNext);
}

function showFailure() {
  const modal = $(`
    <div class="success-overlay" id="failureOverlay">
      <div class="success-modal" style="border-top: 5px solid var(--danger);">
        <h2 style="color:var(--danger); margin-top:0;">❌ 틀렸습니다!</h2>
        <p style="font-size:18px;">순서나 버튼이 맞는지<br>다시 확인해보세요.</p>
        <button id="modalCloseBtn" class="btn-ctrl btn-submit" style="width:100%; margin-top:20px; background:var(--danger);">다시 시도</button>
      </div>
    </div>
  `);
  $("body").append(modal);

  const closeModal = () => {
    modal.remove();
    // resetPuzzle(); <- 이 부분을 삭제하여 클릭 상태를 유지합니다.
  };

  $("#modalCloseBtn").click(closeModal);
}

$(document).ready(() => {
  setStage(1);
});
</script>

</body>
</html>
